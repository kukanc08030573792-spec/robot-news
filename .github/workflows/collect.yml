name: collect-news

on:
  schedule:
    # GitHubの定期実行(schedule)は高負荷時にスキップ・遅延されやすいため、
    # 朝の時間帯に複数回仕掛けて「取りこぼし」を防ぐ。
    # 1本目が動けば以降は seen_ids で重複除外され、無駄な再収集は起きない。
    - cron: '7 21 * * *'    # 06:07 JST
    - cron: '37 21 * * *'   # 06:37 JST（保険1）
    - cron: '37 22 * * *'   # 07:37 JST（保険2）
    - cron: '7 23 * * *'    # 08:07 JST（保険3）
  workflow_dispatch:        # 手動実行（Actionsタブの Run workflow ボタン）

permissions:
  contents: write
  models: read              # GitHub Models（無料AI要約）を使うために必要

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 pyyaml

      - name: Collect and summarize
        run: python scripts/collect.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit results
        run: |
          git config user.name "robot-news-bot"
          git config user.email "actions@users.noreply.github.com"
          # 複数スロットが接近して走った場合に備え、push前に最新を取り込む
          git pull --rebase origin ${{ github.ref_name }} || true
          git add docs/
          # コミット名の日付はJST基準（UTCだと早朝JSTの実行が前日付になり
          # 「今日のニュースが無い」ように見えてしまうため）
          git diff --cached --quiet || {
            git commit -m "chore: collect news $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          }
